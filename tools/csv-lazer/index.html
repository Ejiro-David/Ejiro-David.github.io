<body>
    <div class="shell">
        <a class="back-link" href="/tools/">← All Tools</a>

                <p>[ CREDENTIAL PARSER & CSV GENERATOR ]</p>
            </div>

        <div class="content">
            <!-- Input Section -->
            <div class="section">
                <div class="section-title">>>> PASTE DATA <<<</div>
                <div class="info-box">
                    $ Parse any credential format. Detects platform & generates clean CSV
                </div>
                <textarea id="inputText" placeholder="$ paste credential data here...&#10;&#10;Supports:&#10;• Twitter/X (with email-password, 2FA)&#10;• TikTok (with email)&#10;• Facebook (with 2FA)&#10;• And more..."></textarea>
                <div class="controls">

                    <button class="btn-clear" onclick="clearAll()">Clear</button>
                </div>

                </div>

                    <strong id="statsText"></strong>
                </div>

                    ⬇️  DOWNLOAD CSV

    <script>
        let parsedData = [];
        let csvHeaders = [];
        let parseWarnings = [];

        function parseData() {
            const input = document.getElementById('inputText').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const warningMsg = document.getElementById('warningMessage');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            warningMsg.classList.remove('show');

            if (!input) {
                errorMsg.textContent = '❌ [ERROR] No data provided. Paste credential data to begin.';
                errorMsg.classList.add('show');
                return;
            }

            try {
                const result = intelligentParse(input);
                parsedData = result.accounts;
                parseWarnings = result.warnings;

                // Extract all unique headers
                const headersSet = new Set();
                parsedData.forEach(account => {
                    Object.keys(account).forEach(key => headersSet.add(key));
                });

                // Define priority order
                const priorityOrder = ['profile_link', 'username', 'password', 'email', 'email_password', 'secondary_email', 'phone', '2fa_link'];
                csvHeaders = [];

                // Add headers in priority order
                priorityOrder.forEach(header => {
                    if (headersSet.has(header)) {
                        csvHeaders.push(header);
                        headersSet.delete(header);
                    }
                });

                // Add remaining headers alphabetically
                Array.from(headersSet).sort().forEach(header => {
                    csvHeaders.push(header);
                });

                displayPreview();

                const warningSuffix = parseWarnings.length > 0 ? ` | ${parseWarnings.length} warning(s)` : '';
                successMsg.textContent = `✓ [SUCCESS] Parsed ${parsedData.length} account(s) | ${csvHeaders.length} field(s)${warningSuffix}`;
                successMsg.classList.add('show');

                renderWarnings(parseWarnings);
                document.getElementById('downloadBtn').disabled = parsedData.length === 0;
            } catch (error) {
                errorMsg.textContent = `❌ [ERROR] ${error.message}`;
                errorMsg.classList.add('show');
            }
        }

        function intelligentParse(input) {
            const warnings = [];
            const accounts = [];
            const urls = [];
            const credentialBlocks = [];
            const lines = input.split('\n');

            let currentBlock = null;
            let inCodeFence = false;
            const unrecognizedLines = [];
            const codeFenceLines = [];
            const delayedUrlLines = [];

            const closeCurrentBlock = () => {
                if (currentBlock && Object.keys(currentBlock.fields).length > 0) {
                    credentialBlocks.push(currentBlock);
                }
                currentBlock = null;
            };

            for (let i = 0; i < lines.length; i++) {
                const lineNumber = i + 1;
                const line = lines[i].trim();

                if (line.startsWith('```')) {
                    inCodeFence = !inCodeFence;
                    closeCurrentBlock();
                    continue;
                }

                if (inCodeFence) {
                    if (line) {
                        codeFenceLines.push(lineNumber);
                    }
                    continue;
                }

                if (line === '') {
                    closeCurrentBlock();
                    continue;
                }

                if (isDelimiter(line)) {
                    closeCurrentBlock();
                    continue;
                }

                if (isDecorativeLine(line)) {
                    closeCurrentBlock();
                    continue;
                }

                if (isUrl(line)) {
                    if (currentBlock) {
                        delayedUrlLines.push(lineNumber);
                        closeCurrentBlock();
                    }
                    urls.push(line);
                    continue;
                }

                const parsed = parseCredentialLine(line);
                if (parsed) {
                    const { key, value } = parsed;

                    if (value === '') {
                        warnings.push(`W105 line ${lineNumber}: Empty value for key "${key}" was ignored.`);
                        continue;
                    }

                    if (!currentBlock) {
                        currentBlock = { startLine: lineNumber, fields: {} };
                    }

                    if (Object.prototype.hasOwnProperty.call(currentBlock.fields, key)) {
                        warnings.push(`W104 line ${lineNumber}: Duplicate key "${key}" in the same block; latest value kept.`);
                    }

                    currentBlock.fields[key] = value;
                    continue;
                }

                unrecognizedLines.push(lineNumber);
            }

            closeCurrentBlock();

            if (codeFenceLines.length > 0) {
                warnings.push(`W112: Ignored ${codeFenceLines.length} line(s) inside markdown code fences at line(s) ${formatLineList(codeFenceLines)}.`);
            }

            if (unrecognizedLines.length > 0) {
                warnings.push(`W103: Ignored ${unrecognizedLines.length} unrecognized line(s) at line(s) ${formatLineList(unrecognizedLines)}.`);
            }

            if (delayedUrlLines.length > 0) {
                warnings.push(`W107: Found ${delayedUrlLines.length} link line(s) after credential parsing started at line(s) ${formatLineList(delayedUrlLines)}.`);
            }

            if (urls.length > credentialBlocks.length) {
                const missing = urls.length - credentialBlocks.length;
                warnings.push(`W101: ${urls.length} link(s) found vs ${credentialBlocks.length} credential block(s). Created ${missing} link-only row(s) for trailing unmatched link(s).`);
            } else if (credentialBlocks.length > urls.length) {
                const missing = credentialBlocks.length - urls.length;
                warnings.push(`W102: ${credentialBlocks.length} credential block(s) found vs ${urls.length} link(s). Created ${missing} row(s) with empty "profile_link".`);
            }

            if (urls.length === 0 && credentialBlocks.length > 0) {
                warnings.push('W110: No standalone link lines detected; rows were generated from labeled credential blocks only.');
            }

            if (credentialBlocks.length === 0 && urls.length > 0) {
                warnings.push('W111: No labeled credential blocks detected; link-only rows were generated.');
            }

            const rowCount = Math.max(urls.length, credentialBlocks.length);
            for (let idx = 0; idx < rowCount; idx++) {
                const row = {};
                const block = credentialBlocks[idx];
                const blockFields = block ? block.fields : {};
                const listLink = urls[idx] || '';

                Object.assign(row, blockFields);

                if (listLink && row.profile_link && row.profile_link !== listLink) {
                    warnings.push(`W109 row ${idx + 1}: "profile_link" from credential field differed from link list; link list value was kept.`);
                }

                if (listLink) {
                    row.profile_link = listLink;
                } else if (!row.profile_link) {
                    row.profile_link = '';
                }

                if (Object.keys(row).length > 0) {
                    accounts.push(row);
                }
            }

            return { accounts, warnings };
        }

        function isUrl(str) {
            try {
                const parsed = new URL(str);
                return parsed.protocol === 'http:' || parsed.protocol === 'https:';
            } catch {
                return false;
            }
        }

        function isDelimiter(str) {
            return /^[-=*]{3,}$/.test(str);
        }

        function isDecorativeLine(str) {
            return /^[-=* ]*profile\s+links\s*:/i.test(str);
        }

        function formatLineList(lines, maxShown = 16) {
            const uniqueSorted = Array.from(new Set(lines)).sort((a, b) => a - b);
            if (uniqueSorted.length <= maxShown) {
                return uniqueSorted.join(', ');
            }
            const shown = uniqueSorted.slice(0, maxShown).join(', ');
            const more = uniqueSorted.length - maxShown;
            return `${shown} (+${more} more)`;
        }

        function parseCredentialLine(line) {
            // Choose the earliest separator and split only once to preserve URL values.
            const separators = ['-->', '=>', '::', '->', '|', ':', '='];
            let bestIndex = -1;
            let bestSeparator = '';

            for (const sep of separators) {
                const idx = line.indexOf(sep);
                if (idx <= 0) {
                    continue;
                }

                if (bestIndex === -1 || idx < bestIndex || (idx === bestIndex && sep.length > bestSeparator.length)) {
                    bestIndex = idx;
                    bestSeparator = sep;
                }
            }

            if (bestIndex === -1) {
                return null;
            }

            const rawKey = line.slice(0, bestIndex).trim();
            const rawValue = line.slice(bestIndex + bestSeparator.length).trim();

            const key = normalizeKey(rawKey);
            if (!key) {
                return null;
            }

            return { key, value: rawValue };
        }

        function normalizeKey(key) {
            if (!key || typeof key !== 'string') {
                return null;
            }

            let cleaned = key.toLowerCase().trim();
            cleaned = cleaned.replace(/^[\-\*\u2022]+\s*/, '');
            cleaned = cleaned.replace(/^\d+[\)\.\-]\s*/, '');
            cleaned = cleaned.replace(/^['"`]+|['"`]+$/g, '');
            cleaned = cleaned.replace(/\s+/g, ' ');

            if (!cleaned || !/^[a-z0-9 _-]+$/.test(cleaned)) {
                return null;
            }

            const keyMap = {
                'username': 'username',
                'login': 'username',
                'handle': 'username',
                'user': 'username',
                'password': 'password',
                'passkey': 'password',
                'pass': 'password',
                'pwd': 'password',
                'login_pass': 'password',
                'email': 'email',
                'e-mail': 'email',
                'primary email': 'email',
                'backup_email': 'email',
                'email-password': 'email_password',
                'email_password': 'email_password',
                'email_pass': 'email_password',
                'email pass': 'email_password',
                'password_email': 'email_password',
                'email-pass': 'email_password',
                'secondary email': 'secondary_email',
                'secondary_email': 'secondary_email',
                '2fa': '2fa_link',
                '2fa_link': '2fa_link',
                '2fa link': '2fa_link',
                '2fa_recovery': '2fa_link',
                'backup': '2fa_link',
                'two factor': '2fa_link',
                'profile': 'profile_link',
                'profile_link': 'profile_link',
                'profile_url': 'profile_link',
                'profile url': 'profile_link',
                'profile link': 'profile_link',
                'url': 'profile_link',
                'link': 'profile_link',
                'phone': 'phone',
                'recovery phone': 'phone',
                'security_q': 'security_question',
                'security question': 'security_question',
                'security_a': 'security_answer',
                'security answer': 'security_answer',
                'platform': 'platform',
                'status': 'status',
                'creation_date': 'creation_date',
                'date': 'creation_date'
            };

            if (keyMap[cleaned]) {
                return keyMap[cleaned];
            }

            const normalized = cleaned
                .replace(/[^a-z0-9]+/g, '_')
                .replace(/^_+|_+$/g, '');

            return normalized || null;
        }

        function displayPreview() {
            const table = document.getElementById('previewTable');
            const emptyState = document.getElementById('emptyState');
            const stats = document.getElementById('stats');
            const statsText = document.getElementById('statsText');

            table.querySelector('thead').innerHTML = '';
            table.querySelector('tbody').innerHTML = '';

            if (parsedData.length === 0 || csvHeaders.length === 0) {
                emptyState.textContent = '$ no parsed rows to preview. check warnings.';
                emptyState.style.display = 'flex';
                stats.style.display = 'block';
                statsText.textContent = `$ ${parsedData.length} account(s) | ${csvHeaders.length} field(s) | CHECK WARNINGS`;
                return;
            }

            // Create header row
            const headerRow = document.createElement('tr');
            csvHeaders.forEach(header => {
                const th = document.createElement('th');
                th.textContent = formatHeaderName(header);
                headerRow.appendChild(th);
            });
            table.querySelector('thead').appendChild(headerRow);

            // Create data rows
            parsedData.forEach(account => {
                const row = document.createElement('tr');
                csvHeaders.forEach(header => {
                    const td = document.createElement('td');
                    td.textContent = account[header] || '';
                    row.appendChild(td);
                });
                table.querySelector('tbody').appendChild(row);
            });

            emptyState.style.display = 'none';
            stats.style.display = 'block';
            statsText.textContent = `$ ${parsedData.length} account(s) | ${csvHeaders.length} field(s) | READY`;
        }

        function renderWarnings(warnings) {
            const warningMsg = document.getElementById('warningMessage');
            warningMsg.classList.remove('show');

            if (!warnings || warnings.length === 0) {
                return;
            }

            let text = `⚠️ [WARNINGS] ${warnings.length} issue(s) detected:\n`;
            text += warnings.map(w => `- ${w}`).join('\n');

            warningMsg.textContent = text;
            warningMsg.classList.add('show');
        }

        function formatHeaderName(header) {
            return header
                .split('_')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ')
                .replace(/2fa/gi, '2FA');
        }

        function downloadCSV() {
            if (parsedData.length === 0) return;

            let csv = csvHeaders.join(',') + '\n';

            parsedData.forEach(account => {
                const row = csvHeaders.map(header => {
                    let value = account[header] || '';
                    // Escape quotes and wrap in quotes if contains comma
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        value = '"' + value.replace(/"/g, '""') + '"';
                    }
                    return value;
                });
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            // Generate filename with platform, datetime, and total count
            const filename = generateFilename();

            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function generateFilename() {
            const platform = inferPlatformFromDataset();

            // Get current date and time
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const dateStr = `${year}-${month}-${day}`;
            const timeStr = `${hours}${minutes}${seconds}`;
            const total = parsedData.length;

            return `${platform}_${dateStr}_${timeStr}_t${total}.csv`;
        }

        function inferPlatformFromDataset() {
            const counts = {};

            parsedData.forEach(account => {
                const platform = detectPlatform(account.profile_link || '');
                if (platform) {
                    counts[platform] = (counts[platform] || 0) + 1;
                }
            });

            const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            if (entries.length === 0) {
                return 'accounts';
            }

            if (entries.length > 1 && entries[0][1] === entries[1][1]) {
                return 'mixed';
            }

            if (entries.length > 1) {
                return `${entries[0][0]}_mixed`;
            }

            return entries[0][0];
        }

        function detectPlatform(link) {
            const url = String(link).toLowerCase();
            if (!url) return null;
            if (url.includes('x.com') || url.includes('twitter.com')) return 'twitter';
            if (url.includes('tiktok.com')) return 'tiktok';
            if (url.includes('facebook.com')) return 'facebook';
            if (url.includes('instagram.com')) return 'instagram';
            if (url.includes('linkedin.com')) return 'linkedin';
            if (url.includes('reddit.com')) return 'reddit';
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            return null;
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('previewTable').querySelector('thead').innerHTML = '';
            document.getElementById('previewTable').querySelector('tbody').innerHTML = '';
            document.getElementById('emptyState').textContent = '$ awaiting parsed data...';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
            document.getElementById('warningMessage').classList.remove('show');
            parsedData = [];
            csvHeaders = [];
            parseWarnings = [];
        }
    </script>
</body>
</html>
